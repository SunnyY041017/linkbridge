version: "3.9"

services:
  # ===== Nginx 反向代理 + HTTPS =====
  nginx:
    image: nginx:1.27-alpine
    container_name: linkbridge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./backend/static:/usr/share/nginx/html/static:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lb-net

  # ===== FastAPI 应用 =====
  app:
    build: .
    container_name: linkbridge-app
    expose:
      - "8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TONGYI_API_KEY=${TONGYI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://linkbridge:${DB_PASSWORD:-linkbridge_prod}@postgres:5432/linkbridge
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - llm_cache:/app/backend/llm_cache_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lb-net

  # ===== PostgreSQL + pgvector =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: linkbridge-db
    expose:
      - "5432"
    environment:
      POSTGRES_USER: linkbridge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-linkbridge_prod}
      POSTGRES_DB: linkbridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkbridge -d linkbridge"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lb-net

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: linkbridge-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lb-net

volumes:
  pgdata:
  redis_data:
  llm_cache:

networks:
  lb-net:
    driver: bridge
